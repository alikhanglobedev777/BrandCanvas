services:
  postgres:
    image: postgres:17-alpine
    container_name: brandcanvas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brandcanvas}
      POSTGRES_USER: ${POSTGRES_USER:-brandcanvas}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-brandcanvas_dev_password}
    ports:
      - "5434:5432"
    volumes:
      - brandcanvas_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-brandcanvas} -d ${POSTGRES_DB:-brandcanvas}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: brandcanvas-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_HOST_PORT:-6381}:6379"
    volumes:
      - brandcanvas_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  brandcanvas_postgres_data:
  brandcanvas_redis_data:
